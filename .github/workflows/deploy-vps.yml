name: Deploy To VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build And Push GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REPO: ${{ vars.IMAGE_REPO || format('ghcr.io/{0}/astro-nomi', github.repository_owner) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ env.IMAGE_REPO }}:latest

  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE_REPO: ${{ vars.IMAGE_REPO || format('ghcr.io/{0}/astro-nomi', github.repository_owner) }}
      CONTAINER_NAME: ${{ vars.CONTAINER_NAME || 'astro-nomi' }}
      HOST_PORT: ${{ vars.HOST_PORT || '80' }}
      CONTAINER_PORT: ${{ vars.CONTAINER_PORT || '8081' }}
    steps:
      - name: Deploy container on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -eu

            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            docker pull "${{ env.IMAGE_REPO }}:${{ github.sha }}"

            if docker ps -a --format '{{.Names}}' | grep -Eq '^${{ env.CONTAINER_NAME }}$'; then
              docker rm -f "${{ env.CONTAINER_NAME }}"
            fi

            docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --restart unless-stopped \
              -p "${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }}" \
              "${{ env.IMAGE_REPO }}:${{ github.sha }}"

            docker image prune -f
